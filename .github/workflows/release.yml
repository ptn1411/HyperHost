name: "Release HyperHost"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
            # Use NSIS only — WiX/MSI fails with large binaries (cloudflared ~63MB)
            bundles: nsis

          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
            bundles: dmg

          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            bundles: dmg

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
            bundles: deb,appimage

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
          key: ${{ matrix.target }}

      # Linux: install system dependencies for Tauri
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build hyh CLI binary
        run: |
          cd src-tauri
          cargo build --bin hyh --no-default-features --release --target ${{ matrix.target }}
          # Copy to binaries/ with Tauri naming convention
          EXT=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then EXT=".exe"; fi
          cp target/${{ matrix.target }}/release/hyh${EXT} \
             binaries/hyh-${{ matrix.target }}${EXT}
        shell: bash

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'HyperHost ${{ github.ref_name }}'
          releaseBody: 'Phiên bản mới nhất của HyperHost. Tải xuống file phù hợp với hệ điều hành bên dưới.'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

  # Separate job: CLI-only builds for ARM targets (no Tauri GUI bundle).
  # The `hyh` binary is self-contained and useful on headless ARM servers,
  # Raspberry Pi, AWS Graviton, Surface Pro X, etc.
  cli-arm:
    permissions:
      contents: write
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            label: linux-arm64
            cross: true
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            label: windows-arm64
            cross: false

    runs-on: ${{ matrix.os }}
    name: CLI (${{ matrix.label }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
          key: ${{ matrix.target }}-cli

      - name: Install aarch64 cross-compiler (Linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build hyh CLI
        run: |
          cd src-tauri
          cargo build --bin hyh --no-default-features --release --target ${{ matrix.target }}
        shell: bash

      - name: Stage artifact
        id: stage
        shell: bash
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then EXT=".exe"; fi
          SRC="src-tauri/target/${{ matrix.target }}/release/hyh${EXT}"
          DST="hyh-${{ matrix.target }}${EXT}"
          cp "$SRC" "$DST"
          echo "path=$DST" >> "$GITHUB_OUTPUT"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.stage.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
